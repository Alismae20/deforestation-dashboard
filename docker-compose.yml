version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=backend/app.py
      - PYTHONUNBUFFERED=1
    volumes:
      - ./uploads:/app/uploads
    command: gunicorn --bind 0.0.0.0:5000 backend.app:app

  frontend:
    image: node:18-alpine
    ports:
      - "8000:8000"
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: npx http-server -p 8000 -c-1

networks:
  default:
    driver: bridge
